version: '3.8'

services:
  # Node.js Zalo Agent Server
  zalo-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zalo-agent-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ZALO_WEBHOOK_TOKEN=${ZALO_WEBHOOK_TOKEN}
      - ZALO_OA_ID=${ZALO_OA_ID}
      - ZALO_ACCESS_TOKEN=${ZALO_ACCESS_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
    volumes:
      - ./knowledge_base.json:/app/knowledge_base.json
      - ./logs:/app/logs
    depends_on:
      - ollama
    networks:
      - zalo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - zalo-network
    restart: unless-stopped
    # To pull model automatically on startup:
    # command: serve &
    # entrypoint: /bin/sh -c 'ollama serve & while ! curl -s http://localhost:11434 > /dev/null; do sleep 1; done; ollama pull mistral'

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: zalo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - zalo-agent
    networks:
      - zalo-network
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  zalo-network:
    driver: bridge
